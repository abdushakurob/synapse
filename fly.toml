# fly.toml configuration for Synapse Agents
app = "synapse-agents"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 3002
  processes = ["app"]

  [[services.ports]]
    port = 3002
    handlers = ["http"]
