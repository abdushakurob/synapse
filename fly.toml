# fly.toml configuration for Synapse Agents (Hardened V2)
app = "synapse-demo"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

# Service for Agent A (Main Dashboard)
[[services]]
  internal_port = 3001
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["http", "tls"]

  [[services.http_checks]]
    interval = "10s"
    timeout = "2s"
    method = "get"
    path = "/"
    grace_period = "30s"

# Service for Agent B (Secondary Dashboard)
[[services]]
  internal_port = 3002
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 3002
    handlers = ["http", "tls"]

  [[services.http_checks]]
    interval = "10s"
    timeout = "2s"
    method = "get"
    path = "/"
    grace_period = "30s"
